<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manual of Me</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="watch-container">
    <div id="hover-label" aria-live="polite" aria-atomic="true">
      <span id="hover-label-icon"></span>
      <span id="hover-label-text">Hover over a gear to explore</span>
    </div>
    <main id="main" role="main" aria-label="Manual of Me — click a gear to read a section"></main>
    <div id="watch-label">
      <span id="watch-owner-name">Loading…</span>
    </div>
  </div>

  <!-- Content panel (shown when a gear is clicked) -->
  <div id="content-panel" role="dialog" aria-modal="true" aria-labelledby="panel-title" tabindex="-1" hidden>
    <button id="panel-close" aria-label="Close">×</button>
    <h2 id="panel-title"></h2>
    <div id="panel-body"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
